<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redefinir Password - Kinvera</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .reset-container {
      max-width: 400px;
      margin: 15vh auto;
      padding: 40px;
      text-align: center;
    }
    .reset-container .logo {
      font-size: 32px;
      font-weight: 700;
      background: linear-gradient(135deg, #FF8A00, #FF0080);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 32px;
    }
    .reset-container input {
      width: 100%;
      padding: 14px 16px;
      margin-bottom: 12px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 15px;
      outline: none;
    }
    .reset-container input:focus {
      border-color: var(--primary);
    }
    .reset-container button {
      width: 100%;
      padding: 14px;
      margin-top: 8px;
      background: linear-gradient(135deg, #FF8A00, #FF0080);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    .reset-container .back-link {
      display: block;
      margin-top: 20px;
      color: var(--text-muted);
      font-size: 14px;
    }
    .reset-container .back-link a {
      color: var(--secondary);
      text-decoration: none;
    }
    .reset-container .error {
      color: var(--accent-red);
      font-size: 14px;
      margin-top: 12px;
    }
    .reset-container .success {
      color: var(--accent-green);
      font-size: 14px;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="reset-container">
    <div class="logo">Kinvera</div>
    <h2 style="margin-bottom: 24px; font-size: 22px;">Redefinir Password</h2>
    <p id="status-msg" style="color: var(--text-muted); margin-bottom: 24px; font-size: 14px;"></p>
    <div id="reset-form">
      <input type="password" id="new-password" placeholder="Nova Password">
      <input type="password" id="confirm-password" placeholder="Confirmar Password">
      <button onclick="resetPassword()">Redefinir Password</button>
      <p class="error" id="error-msg"></p>
    </div>
    <p class="back-link"><a href="index.html">Voltar ao login</a></p>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    if (!token) {
      document.getElementById('status-msg').textContent = 'Token de recuperação não encontrado.';
      document.getElementById('status-msg').style.color = 'var(--accent-red)';
      document.getElementById('reset-form').style.display = 'none';
    }

    async function resetPassword() {
      const password = document.getElementById('new-password').value;
      const confirm = document.getElementById('confirm-password').value;
      const errorEl = document.getElementById('error-msg');
      errorEl.textContent = '';

      if (!password || !confirm) {
        errorEl.textContent = 'Preenche ambos os campos';
        return;
      }
      if (password !== confirm) {
        errorEl.textContent = 'As passwords não coincidem';
        return;
      }
      if (password.length < 6) {
        errorEl.textContent = 'Password deve ter pelo menos 6 caracteres';
        return;
      }

      try {
        const API_URL = 'http://10.0.2.2:3000/api';
        const res = await fetch(`${API_URL}/auth/reset-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password })
        });
        const data = await res.json();

        if (!res.ok) {
          errorEl.textContent = data.error || 'Erro ao redefinir password';
          errorEl.style.color = 'var(--accent-red)';
          return;
        }

        document.getElementById('reset-form').style.display = 'none';
        document.getElementById('status-msg').textContent = 'Password atualizada com sucesso! A redirecionar para o login...';
        document.getElementById('status-msg').style.color = 'var(--accent-green)';
        setTimeout(() => { window.location.href = 'index.html'; }, 3000);
      } catch (e) {
        errorEl.textContent = 'Erro de conexão. Tenta novamente.';
        errorEl.style.color = 'var(--accent-red)';
      }
    }
  </script>
</body>
</html>
